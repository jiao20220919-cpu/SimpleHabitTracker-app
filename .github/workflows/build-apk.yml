name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许在 GitHub Action 页面手动触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: |
        rm -rf package-lock.json node_modules
        npm install --include=optional
        # Force install the Linux x64 native binary for Tailwind CSS v4 in case of npm bug
        npm install @tailwindcss/oxide-linux-x64-gnu

    - name: Build Web App & Sync Capacitor
      run: |
        npm run build
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Repair Gradlew and Wrapper (fixes Windows line-endings and corrupt wrapper jar bugs)
      run: |
        # Fix line endings in the gradlew bash script in case it was checked in with CRLF from Windows
        sed -i -e 's/\r$//' android/gradlew
        # Download a fresh, uncorrupted gradle-wrapper.jar directly from official Gradle repo to replace any corrupted checked-in jar
        mkdir -p android/gradle/wrapper
        curl -L https://github.com/gradle/gradle/raw/v8.12.0/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Habit-Tracker-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
